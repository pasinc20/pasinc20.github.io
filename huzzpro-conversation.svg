<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="1200" y1="0" x2="0" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17284D" />
      <stop offset="1" stop-color="#0A1224" />
    </linearGradient>
    <linearGradient id="frameGradient" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#11192E" />
      <stop offset="1" stop-color="#0B1022" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7AA7FF" />
      <stop offset="1" stop-color="#7DF8D5" />
    </linearGradient>
    <filter id="shadow" x="255" y="80" width="690" height="780" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="32" stdDeviation="48" flood-color="#02050F" flood-opacity="0.65" />
    </filter>
    <linearGradient id="headerGradient" x1="0" y1="0" x2="0" y2="180">
      <stop stop-color="#121B33" />
      <stop offset="1" stop-color="#0B1122" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="48" fill="url(#bgGradient)" />
  <g opacity="0.55">
    <circle cx="240" cy="180" r="140" fill="#203560" />
    <circle cx="990" cy="720" r="220" fill="#132445" />
    <circle cx="930" cy="140" r="110" fill="#1B315C" />
  </g>
  <g filter="url(#shadow)">
    <rect x="315" y="140" width="570" height="620" rx="52" fill="url(#frameGradient)" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
    <rect x="344" y="180" width="512" height="548" rx="36" fill="#060A15" />
    <rect x="344" y="180" width="512" height="110" rx="36" fill="url(#headerGradient)" />
    <circle cx="372" cy="234" r="22" fill="#1D2640" />
    <text x="404" y="242" fill="#F7F9FF" font-size="22" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="600">Jess</text>
    <text x="404" y="270" fill="#6E7CA3" font-size="15" font-family="'Inter', 'Segoe UI', sans-serif">Last active 2m ago</text>
    <rect x="356" y="312" width="280" height="84" rx="22" fill="#121B33" />
    <text x="376" y="344" fill="#AEB7D3" font-size="16" font-family="'Inter', 'Segoe UI', sans-serif">Jess • 7:42 PM</text>
    <text x="376" y="371" fill="#F7F9FF" font-size="18" font-family="'Inter', 'Segoe UI', sans-serif">“Still down for rooftop drinks?”</text>
    <rect x="584" y="416" width="240" height="84" rx="22" fill="#1B2440" />
    <text x="604" y="448" fill="#AEB7D3" font-size="16" font-family="'Inter', 'Segoe UI', sans-serif">Jess • 7:44 PM</text>
    <text x="604" y="475" fill="#F7F9FF" font-size="18" font-family="'Inter', 'Segoe UI', sans-serif">“I found a new spot by the river.”</text>
    <rect x="416" y="522" width="372" height="96" rx="26" fill="url(#accentGradient)" />
    <text x="442" y="560" fill="#051126" font-size="18" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="600">Your wingman suggests…</text>
    <text x="442" y="588" fill="#051126" font-size="17" font-family="'Inter', 'Segoe UI', sans-serif">“Say 8? I’ll grab us the best view.”</text>
    <rect x="384" y="634" width="180" height="46" rx="14" fill="#141E36" />
    <text x="410" y="663" fill="#9AA4C0" font-size="16" font-family="'Inter', 'Segoe UI', sans-serif">Warm • Ready</text>
    <rect x="576" y="634" width="200" height="46" rx="14" fill="#141E36" />
    <text x="602" y="663" fill="#9AA4C0" font-size="16" font-family="'Inter', 'Segoe UI', sans-serif">Tap to copy &amp; send</text>
  </g>
</svg>
