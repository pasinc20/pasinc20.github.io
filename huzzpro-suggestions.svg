<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="100" y1="80" x2="1100" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1A33" />
      <stop offset="1" stop-color="#050A18" />
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#101B32" />
      <stop offset="1" stop-color="#0A1327" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7AA7FF" />
      <stop offset="1" stop-color="#7DF8D5" />
    </linearGradient>
    <filter id="shadow" x="236" y="92" width="728" height="716" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="48" flood-color="#000" flood-opacity="0.6" />
    </filter>
  </defs>
  <rect width="1200" height="900" rx="48" fill="url(#bg)" />
  <g opacity="0.45">
    <circle cx="240" cy="212" r="170" fill="#1A2D55" />
    <circle cx="940" cy="680" r="210" fill="#102038" />
    <circle cx="970" cy="180" r="140" fill="#143463" />
  </g>
  <g filter="url(#shadow)">
    <rect x="296" y="140" width="608" height="560" rx="48" fill="url(#frame)" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
    <rect x="326" y="176" width="548" height="488" rx="36" fill="#060A15" />
    <rect x="326" y="176" width="548" height="104" rx="36" fill="#101A31" />
    <text x="356" y="236" fill="#F7F9FF" font-size="24" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="700">Reply toolkit</text>
    <text x="356" y="268" fill="#7F8DB4" font-size="15" font-family="'Inter', 'Segoe UI', sans-serif">Pick a tone or ask Huzz to remix.</text>
    <rect x="356" y="312" width="468" height="90" rx="22" fill="#121F3C" />
    <text x="384" y="346" fill="#9AA6C8" font-size="14" font-family="'Inter', 'Segoe UI', sans-serif">WITTY · Suggested</text>
    <text x="384" y="374" fill="#F7F9FF" font-size="20" font-family="'Inter', 'Segoe UI', sans-serif">“Let’s trade rooftops — loser buys dessert.”</text>
    <rect x="356" y="414" width="468" height="90" rx="22" fill="#101B32" stroke="rgba(122, 167, 255, 0.35)" stroke-width="1" />
    <text x="384" y="448" fill="#9AA6C8" font-size="14" font-family="'Inter', 'Segoe UI', sans-serif">WARM · Alternative</text>
    <text x="384" y="476" fill="#F7F9FF" font-size="20" font-family="'Inter', 'Segoe UI', sans-serif">“How about 8? I’ll grab a cosy corner for us.”</text>
    <rect x="356" y="516" width="468" height="90" rx="22" fill="#0F172B" stroke="rgba(125, 248, 213, 0.45)" stroke-width="1" />
    <text x="384" y="550" fill="#9AA6C8" font-size="14" font-family="'Inter', 'Segoe UI', sans-serif">BOLD · Remix</text>
    <text x="384" y="578" fill="#F7F9FF" font-size="20" font-family="'Inter', 'Segoe UI', sans-serif">“Text me the address, I’ll secure the VIP view.”</text>
    <rect x="356" y="620" width="182" height="48" rx="16" fill="url(#cardGradient)" />
    <text x="386" y="651" fill="#061126" font-size="16" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="600">Copy witty reply</text>
    <rect x="548" y="620" width="182" height="48" rx="16" fill="#131E35" />
    <text x="576" y="651" fill="#9AA4C0" font-size="16" font-family="'Inter', 'Segoe UI', sans-serif">More like this</text>
  </g>
</svg>
